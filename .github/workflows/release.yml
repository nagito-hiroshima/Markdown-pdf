name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag, for example v1.0.0"
        required: true
        type: string

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Resolve release tag
        id: release_tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          fi

      - name: Validate JavaScript
        run: |
          node --check extension/background.js
          node --check extension/content-script.js
          node --check extension/i18n.js
          node --check extension/markdown.js
          node --check extension/popup.js
          node --check extension/viewer.js

      - name: Validate manifest and locales
        run: |
          node -e "for (const file of ['extension/manifest.json','extension/_locales/en/messages.json','extension/_locales/ja/messages.json']) JSON.parse(require('fs').readFileSync(file,'utf8'))"
          node -e "const fs=require('fs'); const manifest=fs.readFileSync('extension/manifest.json','utf8'); const keys=Array.from(manifest.matchAll(/__MSG_([A-Za-z0-9_]+)__/g), m=>m[1]); for (const locale of ['en','ja']) { const messages=JSON.parse(fs.readFileSync('extension/_locales/' + locale + '/messages.json','utf8')); for (const key of keys) if (!messages[key]) throw new Error(locale + ' missing ' + key); }"

      - name: Check tag matches manifest version
        run: |
          TAG="${{ steps.release_tag.outputs.tag }}"
          MANIFEST_VERSION="$(node -p "require('./extension/manifest.json').version")"
          if [ "$TAG" != "v$MANIFEST_VERSION" ]; then
            echo "Tag $TAG does not match manifest version v$MANIFEST_VERSION"
            exit 1
          fi

      - name: Build extension package
        run: |
          TAG="${{ steps.release_tag.outputs.tag }}"
          PACKAGE_DIR="markdown-pdf-viewer-${TAG}"
          cd extension
          zip -r "../${PACKAGE_DIR}.zip" .

      - name: Create release notes
        run: |
          TAG="${{ steps.release_tag.outputs.tag }}"
          cat > release-notes.md << EOF
          ## Markdown PDF Viewer ${TAG}

          ### English

          Chrome / Edge extension package for Markdown PDF Viewer.

          - Open GitHub Markdown files in a PDF-style viewer
          - Support GitHub Raw Markdown URLs
          - Add page buttons for PDF view and print
          - Support English and Japanese extension UI
          - Render headings, lists, code blocks, blockquotes, links, images, and tables

          ### 日本語

          Markdown PDF Viewer の Chrome / Edge 拡張機能パッケージです。

          - GitHub上のMarkdownファイルをPDF風ビューアで表示
          - GitHub Raw Markdown URLに対応
          - ページ上にPDF表示・印刷ボタンを追加
          - 拡張機能UIは日本語と英語に対応
          - 見出し、リスト、コードブロック、引用、リンク、画像、表を表示

          ### Install / インストール

          1. Download \`markdown-pdf-viewer-${TAG}.zip\`.
          2. Extract the zip file.
          3. Open \`chrome://extensions\` or \`edge://extensions\`.
          4. Enable developer mode.
          5. Click \`Load unpacked\`.
          6. Select the extracted folder.
          EOF

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release_tag.outputs.tag }}
          name: Markdown PDF Viewer ${{ steps.release_tag.outputs.tag }}
          body_path: release-notes.md
          files: markdown-pdf-viewer-${{ steps.release_tag.outputs.tag }}.zip
