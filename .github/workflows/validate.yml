name: Validate

on:
  push:
  pull_request:

jobs:
  syntax:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: extension

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Check JavaScript syntax
        run: |
          node --check background.js
          node --check content-script.js
          node --check i18n.js
          node --check markdown.js
          node --check popup.js
          node --check viewer.js

      - name: Validate manifest
        run: node -e "JSON.parse(require('fs').readFileSync('manifest.json','utf8'))"

      - name: Validate locales
        run: |
          node -e "for (const file of ['_locales/en/messages.json','_locales/ja/messages.json']) JSON.parse(require('fs').readFileSync(file,'utf8'))"
          node -e "const fs=require('fs'); const manifest=fs.readFileSync('manifest.json','utf8'); const keys=Array.from(manifest.matchAll(/__MSG_([A-Za-z0-9_]+)__/g), m=>m[1]); for (const locale of ['en','ja']) { const messages=JSON.parse(fs.readFileSync('_locales/' + locale + '/messages.json','utf8')); for (const key of keys) if (!messages[key]) throw new Error(locale + ' missing ' + key); }"
