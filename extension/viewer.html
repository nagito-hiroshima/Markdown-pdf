<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Markdown PDF Viewer</title>
    <link rel="stylesheet" href="viewer.css">
  </head>
  <body>
    <header class="topbar">
      <div>
        <p class="eyebrow">Markdown PDF Viewer</p>
        <h1 id="documentTitle" data-i18n="loadingTitle">Loading</h1>
      </div>
      <div class="actions">
        <button id="reloadButton" type="button" data-i18n="reloadButton" data-i18n-title="reloadButton">Reload</button>
        <button id="printButton" type="button" data-i18n="printButton" data-i18n-title="printButton">Print</button>
      </div>
    </header>

    <main class="layout">
      <aside class="toc" data-i18n-aria-label="tocLabel" aria-label="Table of Contents">
        <div class="toc-title" data-i18n="tocLabel">Table of Contents</div>
        <nav id="tocList"></nav>
      </aside>
      <article class="page">
        <div id="message" class="message" data-i18n="loadingMarkdown">Loading Markdown.</div>
        <section id="errorPanel" class="error-panel" hidden>
          <h2 id="errorTitle"></h2>
          <p id="errorDescription"></p>
          <dl><dt data-i18n="requestedUrlLabel">Requested URL</dt><dd id="errorUrl"></dd></dl>
          <details><summary data-i18n="technicalDetails">Technical details</summary><pre id="errorDetails"></pre></details>
          <div class="error-actions">
            <button id="retryButton" type="button" data-i18n="retryButton">Retry</button>
            <button id="openOtherButton" type="button" data-i18n="openOtherUrlButton">Open another URL</button>
            <button id="helpButton" type="button" data-i18n="viewHelpButton">View help</button>
          </div>
        </section>
        <div id="content" class="content"></div>
      </article>
    </main>

    <script src="i18n.js"></script>
    <script src="url-utils.js"></script>
    <script src="markdown.js"></script>
    <script src="viewer.js"></script>
  </body>
</html>
